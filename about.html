<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BC Sol</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      background:#fff8f0; /* cream */
      color:#333;
    }

    /* HEADER */
    header{
      background:#800000; /* maroon */
      color:white;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:24px;
      letter-spacing:1px;
    }

    /* NAVBAR */
    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#ffd700; /* yellow */
    }

    /* MAIN SECTION */
    .main{
      padding:60px 40px;
      text-align:center;
    }

    .main h2{
      color:#800000;
      font-size:36px;
      margin-bottom:20px;
    }

    .main p{
      font-size:18px;
      margin-bottom:30px;
    }

    .btn{
      background:#ffd700; /* yellow */
      color:black;
      padding:12px 25px;
      border:none;
      border-radius:25px;
      cursor:pointer;
      font-weight:500;
      transition:0.3s;
    }

    .btn:hover{
      background:#800000;
      color:white;
    }

    /* CARD SECTION */
    .cards{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:40px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      padding:20px;
      width:250px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card h3{
      color:#800000;
      margin-bottom:10px;
    }

  </style>
</head>

<body>

  <!-- HEADER + NAVBAR -->
  <header>
    <h1>PrinceTech</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- MAIN BODY -->
  <section class="main">
    <h2>About US</h2>
    <p>This is about page</p>
    
</body>
</html>
